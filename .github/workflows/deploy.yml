name: deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Lint & Test Dependencies
        run: |
          uv pip install --system ruff langgraph langchain mlflow databricks-sdk pydantic requests nest_asyncio

      - name: Run Ruff Lint Check
        run: |
          ruff check agent/ client/

      - name: Run Graph Smoke Test
        run: |
          python -c "
          try:
              from agent.graph import build_graph

              # A smoke test only needs to prove the graph *compiles* — no real
              # LLM/retriever/tool calls happen at build/compile time, so a
              # lightweight stand-in LLM is enough to exercise add_node /
              # add_edge / add_conditional_edges / compile without needing
              # live Databricks credentials in CI.
              class DummyLLM:
                  def invoke(self, messages):
                      raise NotImplementedError('Not called during compile-time smoke test')

              graph = build_graph(llm=DummyLLM())
              assert graph is not None, 'build_graph() returned None'
              print(' Smoke Test Passed: Graph compiled successfully!')
          except Exception as e:
              print(f' Smoke Test Failed: {e}')
              import sys; sys.exit(1)
          "

  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Deployment Dependencies
        run: |
          uv pip install --system mlflow databricks-sdk langchain langgraph nest_asyncio

      - name: Log model and register new Unity Catalog version
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          python deployment/log_and_register.py

      - name: Deploy / update serving endpoint
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          python deployment/deploy.py