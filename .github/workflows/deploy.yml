name: deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --extra dev

      - name: Run Ruff Lint Check
        run: |
          uv run ruff check agent/ client/

      - name: Run Graph Smoke Test
        run: |
          uv run python -c "
          try:
              from agent.graph import build_graph

              class DummyLLM:
                  def invoke(self, messages):
                      raise NotImplementedError('Not called during compile-time smoke test')

              graph = build_graph(llm=DummyLLM())
              assert graph is not None, 'build_graph() returned None'
              print('✅ Smoke Test Passed: Graph compiled successfully!')
          except Exception as e:
              print(f'❌ Smoke Test Failed: {e}')
              import sys; sys.exit(1)
          "

  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync

      - name: Log model and register new Unity Catalog version
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_MODEL: ${{ secrets.DATABRICKS_MODEL }}
          VECTOR_SEARCH_ENDPOINT: ${{ vars.VECTOR_SEARCH_ENDPOINT }}
          VECTOR_SEARCH_INDEX: ${{ vars.VECTOR_SEARCH_INDEX }}
          EMBEDDINGS_ENDPOINT: ${{ vars.EMBEDDINGS_ENDPOINT }}
        run: |
          uv run python deployment/log_and_register.py

      - name: Deploy / update serving endpoint
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          uv run python deployment/deploy.py

      - name: Print deployment summary
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          uv run python -c "
          import os
          from databricks.sdk import WorkspaceClient

          w = WorkspaceClient()
          endpoint_name = 'document_analyst_27100316'
          status = w.serving_endpoints.get(name=endpoint_name)
          state = status.state
          ready = state.ready.value if hasattr(state.ready, 'value') else str(state.ready)
          endpoint_url = f'{w.config.host}/serving-endpoints/{endpoint_name}/invocations'
          model_version = os.environ.get('MODEL_VERSION', 'unknown')

          summary = f'''## Deployment Summary

          | Field | Value |
          |---|---|
          | Registered Model Version | {model_version} |
          | Endpoint Status | {ready} |
          | Endpoint URL | \`{endpoint_url}\` |
          '''
          print(summary)

          summary_file = os.environ.get('GITHUB_STEP_SUMMARY')
          if summary_file:
              with open(summary_file, 'a') as f:
                  f.write(summary)
          "