# Bonus A — CI/CD pipeline (.github/workflows/deploy.yml)
#
# TODO: Implement a lint -> test -> deploy workflow.
#   - lint:   ruff check on agent/ and client/
#   - test:   a smoke test that imports and compiles the graph
#   - deploy: ONLY on push to main; log the model, register a new UC version,
#             and update the serving endpoint. Use GitHub Secrets for
#             DATABRICKS_HOST / DATABRICKS_TOKEN. Add a workflow_dispatch trigger.

name: deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Lint & Test Dependencies
        run: |
          uv pip install --system ruff langgraph langchain mlflow databricks-sdk pydantic requests nest_asyncio

      - name: Run Ruff Lint Check
        run: |
          ruff check agent/ client/

      - name: Run Graph Smoke Test
        run: |
          python -c "
          try:
              try:
                  from agent.graph import graph
              except ImportError:
                  from rag.graph import graph
              print('✅ Smoke Test Passed: Graph compiled and imported successfully!')
          except Exception as e:
              print(f'❌ Smoke Test Failed: {e}')
              import sys; sys.exit(1)
          "

  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Deployment Dependencies
        run: |
          uv pip install --system mlflow databricks-sdk langchain langgraph nest_asyncio

      - name: Run Deployment Script
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          python deployment/deploy.py