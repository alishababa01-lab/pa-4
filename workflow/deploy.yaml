name: "CI/CD Pipeline - Document Analyst Deployment"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Linting
  # -------------------------------------------------------------------------
  lint:
    name: "Static Code Analysis (Ruff)"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Set up Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: "Install Linting Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: "Run Ruff Check"
        run: |
          echo "Checking syntax and formatting anomalies in rag/ and client/..."
          ruff check rag/ client/

  # -------------------------------------------------------------------------
  # Job 2: Smoke Testing
  # -------------------------------------------------------------------------
  test:
    name: "Graph Smoke Test Verification"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Set up Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: "Install Runtime Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install langgraph langchain mlflow databricks-sdk pydantic requests nest_asyncio

      - name: "Execute Graph Compilation Smoke Test"
        run: |
          echo "Verifying agent layout stability and compilation integrity..."
          python -c "
          try:
              from rag.graph import graph
              compiled_workflow = graph.compile()
              print(' Smoke Test Passed: LangGraph successfully imported and compiled without exceptions!')
          except Exception as e:
              print(f' Smoke Test Failed: Error compiling the application graph: {e}')
              import sys; sys.exit(1)
          "

  # -------------------------------------------------------------------------
  # Job 3: Continuous Deployment (CD)
  # -------------------------------------------------------------------------
  deploy:
    name: "Deploy to Databricks Model Serving"
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      CATALOG: "cs4603"
      SCHEMA: "default"
      MODEL_NAME: "alisha_document_analyst_model"
      ENDPOINT_NAME: "alisha-document-analyst"

    steps:
      - name: "Checkout Code"
        uses: actions/checkout@v4

      - name: "Set up Python 3.10"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: "Install Deployment SDKs"
        run: |
          python -m pip install --upgrade pip
          pip install mlflow databricks-sdk langchain langgraph nest_asyncio

      - name: "Execute Pipeline Logic"
        run: |
          python -c "
          import os
          import sys
          import mlflow
          from databricks.sdk import WorkspaceClient
          from databricks.sdk.service.serving import EndpointCoreConfigInput, ServedModelInput

          host = os.environ.get('DATABRICKS_HOST')
          token = os.environ.get('DATABRICKS_TOKEN')
          if not host or not token:
              print('❌ Error: Missing required Databricks Authentication Credentials!')
              sys.exit(1)

          print('Configuring MLflow Registry Context...')
          mlflow.set_registry_uri('databricks-uc')
          
          full_uc_model_path = f\"{os.environ['CATALOG']}.{os.environ['SCHEMA']}.{os.environ['MODEL_NAME']}\"
          print(f\"Target Register Path: {full_uc_model_path}\")

          print('Logging application to MLflow Tracking Server...')
          from rag.graph import graph
          compiled_graph = graph.compile()

          with mlflow.start_run() as run:
              model_info = mlflow.langchain.log_model(
                  lc_model=compiled_graph,
                  artifact_path='model',
                  registered_model_name=full_uc_model_path
              )
          
          deployed_version = model_info.registered_model_version
          print(f\" Successfully registered Model Version: {deployed_version}\")

          print(f\"Updating Endpoint '{os.environ['ENDPOINT_NAME']}' to serve new version...\")
          w = WorkspaceClient(host=host, token=token)

          config = EndpointCoreConfigInput(
              served_models=[
                  ServedModelInput(
                      model_name=full_uc_model_path,
                      model_version=str(deployed_version),
                      workload_size='Small',
                      scale_to_zero_enabled=True
                  )
              ]
          )

          w.serving_endpoints.update_config(
              name=os.environ['ENDPOINT_NAME'],
              served_models=config.served_models
          )
          
          endpoint_state = w.serving_endpoints.get(name=os.environ['ENDPOINT_NAME'])
          
          print('=' * 60)
          print('🚀 DEPLOYMENT COMPLETED SUCCESSFULLY'.center(60))
          print('=' * 60)
          print(f\" Registered Unity Catalog Version : {deployed_version}\")
          print(f\" Model Gateway Route Path         : {full_uc_model_path}\")
          print(f\" Serving Endpoint Target Name    : {endpoint_state.name}\")
          print(f\" Endpoint Operational State       : {endpoint_state.state.config_update}\")
          print('=' * 60)
          "